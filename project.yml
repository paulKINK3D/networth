name: Networth
options:
  bundleIdPrefix: com.bluelava.me
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_MODULE_VERIFIER: YES

packages:
  NetworthCore:
    path: NetworthCore

targets:
  Networth:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Networth
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Networth/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bluelava.me.networth
        PRODUCT_NAME: Networth
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Networth/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Networth/Resources/Networth.entitlements
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - package: NetworthCore
        product: NetworthCore

  NetworthTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - NetworthTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bluelava.me.networthTests
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Networth

schemes:
  Networth:
    build:
      targets:
        Networth: all
        NetworthTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NetworthTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
